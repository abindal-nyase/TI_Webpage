    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {

    #map {

    /* ── Top overlay: act label + headline + counter ─────────────────── */
    .act2-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 500;

      font-size: 9px;
      letter-spacing: 0.20em;

    }

    .act2-headline {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #AFBEB9;
      margin-bottom: 14px;
      max-width: 520px;
      line-height: 1.5;
    }

    .act2-counter {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #585049;
    }

    .act2-counter strong {
      color: #8CB0BE;
      font-weight: 500;
    }

    /* ── Legend ──────────────────────────────────────────────────────── */
    .act2-legend {
      position: absolute;
      bottom: 36px;
      left: 36px;
      z-index: 500;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: #585049;
      line-height: 2.2;
      pointer-events: none;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-divider {
      border: none;
      border-top: 1px solid #232726;
      margin: 6px 0;
      width: 160px;
    }

    .legend-total {
      font-size: 8px;
      letter-spacing: 0.14em;
      color: #2E3332;

    .leaflet-control-zoom         { display: none !important; }
    .leaflet-control-attribution  {
